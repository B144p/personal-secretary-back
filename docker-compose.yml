# version: '3.9'

services:
  personal_secretary_postgres:
    image: postgres:16-alpine
    container_name: personal_secretary_db
    restart: always
    env_file:
      - .env
    ports:
      - '${POSTGRES_PORT}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 3s
      timeout: 5s
      retries: 5
    volumes:
      - personal_secretary_db_data:/var/lib/postgresql/data
    networks:
      - default
      - monitor_network

volumes:
  personal_secretary_db_data:

networks:
  monitor_network:
    external: true
